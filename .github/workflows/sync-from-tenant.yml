name: Extract iFlows from Tenant to GitHub

on:
  workflow_dispatch:      # Allows you to click the button to run manually
  schedule:
    - cron: '0 22 * * 1-5' # Runs automatically every weekday at 10 PM UTC

jobs:
  sync-tenant-to-git:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      # STEP 1: Download the iFlow bundle from SAP CPI
      - name: Pull iFlow Content via SAP Project Piper
        uses: SAP/project-piper-action@master
        with:
          # FIXED: Used the exact official step name
          command: integrationArtifactDownload
        env:
          PIPER_apiServiceKey: ${{ secrets.CPI_API_SERVICE_KEY }}
          # REPLACED: Ensure this matches the EXACT technical ID from your tenant metadata
          PIPER_integrationFlowId: 'Test_Integration_flow' 
          # ADDED: Explicitly define your target version (usually 'active' or '1.0.0')
          PIPER_integrationFlowVersion: '1.0.0' 
          PIPER_integrationContentPath: ${{ github.workspace }}

      # STEP 2: Commit and push the downloaded files back to GitHub
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if there are any new files or changes to commit
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Automated Sync: Updated Test_Integration_flow from CPI Tenant"
            git push
          else
            echo "No changes found between CPI tenant and repository."
          fi
