name: Extract iFlows from Tenant to GitHub

on:
  workflow_dispatch:      # Allows you to click the button to run manually
  schedule:
    - cron: '0 22 * * 1-5' # Runs automatically every weekday at 10 PM UTC

jobs:
  sync-tenant-to-git:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Pull iFlow Content via SAP Project Piper
        uses: SAP/project-piper-action@master
        with:
          # FIXED: Pass the required Piper command explicitly
          command: integrationArtifactGet
          # FIXED: Use the correct global JSON parameter flag to inject settings
          flags: --stepConfigJSON '{"apiServiceKey":"${{ secrets.CPI_API_SERVICE_KEY }}","integrationFlowId":"Test_Integration_flow"}'
