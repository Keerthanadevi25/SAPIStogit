name: Extract iFlows from Tenant to GitHub

on:
  workflow_dispatch:      # Allows you to click the button to run manually
  schedule:
    - cron: '0 22 * * 1-5' # Runs automatically every weekday at 10 PM UTC

jobs:
  sync-tenant-to-git:
    runs-on: ubuntu-latest
    container:
      image: engswee/flashpipe:latest # Required underlying container framework
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      
      - name: Sync Integration Packages using FlashPipe Action
        uses: engswee/flashpipe-action/sync@v1
        with:
          # Tenant URLs & Auth
          tmn-host: "90cfb10ftrial.integrationsuite-trial01.cfapps.us10-001.hana.ondemand.com" # Just the host name (No https://)
          oauth-host: ${{ secrets.CPI_TOKEN_URL }}           # From your Service Key (uaa.url host)
          oauth-clientid: ${{ secrets.CPI_CLIENT_ID }}
          oauth-clientsecret: ${{ secrets.CPI_CLIENT_SECRET }}
          
          # Target Content Configuration
          package-id: "Your_Integration_Package_ID"         # Your SAP Integration Package ID
          dir-git-repo: ${{ github.workspace }}            # Tells it where to save the files
