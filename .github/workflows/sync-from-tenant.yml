name: Extract iFlows from Tenant to GitHub

on:
  workflow_dispatch:      # Allows you to click the button to run manually
  schedule:
    - cron: '0 22 * * 1-5' # Runs automatically every weekday at 10 PM UTC

jobs:
  sync-tenant-to-git:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      # Pre-create a standard directory folder to make saving files foolproof
      - name: Create local src directory
        run: mkdir -p src

      # STEP 1: Download the iFlow bundle from SAP CPI
      - name: Pull iFlow Content via SAP Project Piper
        uses: SAP/project-piper-action@master
        with:
          command: integrationArtifactDownload
        env:
          # FIXED: Pass the authentication key normally
          PIPER_apiServiceKey: ${{ secrets.CPI_API_SERVICE_KEY }}
          # FIXED: Inject parameters using the global JSON override string to force path resolution
          PIPER_parametersJSON: '{"integrationFlowId":"Test_Integration_flow","integrationFlowVersion":"1.0.0","integrationContentPath":"./src"}'

      # STEP 2: Commit and push the downloaded files back to GitHub
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Automated Sync: Updated Test_Integration_flow from CPI Tenant"
            git push
          else
            echo "No changes found between CPI tenant and repository."
          fi
